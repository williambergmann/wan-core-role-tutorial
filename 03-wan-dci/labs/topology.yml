# Module 03: WAN DCI — Containerlab Topology
# Two-site EVPN/VXLAN fabrics connected via WAN eBGP
#
# Topology:
#   Site A (AS 65001): 1 Spine + 2 Leaves + 1 Border-GW + 1 Host
#   Site B (AS 65002): 1 Spine + 2 Leaves + 1 Border-GW + 1 Host
#   WAN: eBGP between Border-GWs
#
#   Site A                    WAN               Site B
#   [Spine-A]                                   [Spine-B]
#    / \                                          / \
# [L-A1] [L-A2]                             [L-B1] [L-B2]
#   |       |                                  |       |
# [H-A]  [Border-A]----eBGP----[Border-B]   [H-B]
#
# Site A: iBGP EVPN + OSPF underlay (AS 65001)
# Site B: iBGP EVPN + OSPF underlay (AS 65002)
# WAN: eBGP IPv4 + L2VPN EVPN between borders

name: wan-dci-multisite

topology:
  kinds:
    linux:
      image: vrnetlab/vr-nxos:9.3.10

  nodes:
    # Site A
    spine-a:
      kind: linux
      mgmt-ipv4: 172.20.20.101
      labels:
        site: site-a
        role: spine
        asn: "65001"

    leaf-a1:
      kind: linux
      mgmt-ipv4: 172.20.20.111
      labels:
        site: site-a
        role: leaf
        asn: "65001"

    leaf-a2:
      kind: linux
      mgmt-ipv4: 172.20.20.112
      labels:
        site: site-a
        role: leaf-border
        asn: "65001"

    border-a:
      kind: linux
      mgmt-ipv4: 172.20.20.120
      labels:
        site: site-a
        role: border-gw
        asn: "65001"

    host-a:
      kind: linux
      image: alpine:latest
      mgmt-ipv4: 172.20.20.201

    # Site B
    spine-b:
      kind: linux
      mgmt-ipv4: 172.20.20.151
      labels:
        site: site-b
        role: spine
        asn: "65002"

    leaf-b1:
      kind: linux
      mgmt-ipv4: 172.20.20.161
      labels:
        site: site-b
        role: leaf
        asn: "65002"

    leaf-b2:
      kind: linux
      mgmt-ipv4: 172.20.20.162
      labels:
        site: site-b
        role: leaf-border
        asn: "65002"

    border-b:
      kind: linux
      mgmt-ipv4: 172.20.20.170
      labels:
        site: site-b
        role: border-gw
        asn: "65002"

    host-b:
      kind: linux
      image: alpine:latest
      mgmt-ipv4: 172.20.20.251

  links:
    # Site A fabric
    - endpoints: ["spine-a:eth1", "leaf-a1:eth1"]
    - endpoints: ["spine-a:eth2", "leaf-a2:eth1"]
    - endpoints: ["spine-a:eth3", "border-a:eth1"]
    - endpoints: ["host-a:eth1", "leaf-a1:eth2"]

    # Site B fabric
    - endpoints: ["spine-b:eth1", "leaf-b1:eth1"]
    - endpoints: ["spine-b:eth2", "leaf-b2:eth1"]
    - endpoints: ["spine-b:eth3", "border-b:eth1"]
    - endpoints: ["host-b:eth1", "leaf-b1:eth2"]

    # WAN link (eBGP between border gateways)
    - endpoints: ["border-a:eth2", "border-b:eth2"]

# Usage:
#   sudo containerlab deploy -t topology.yml
#   sudo containerlab destroy -t topology.yml
