# Lab Device Inventory
---
all:
  vars:
    ansible_user: admin
    ansible_password: "{{ vault_password }}"
    ansible_network_os: cisco.nxos.nxos
    ansible_connection: ansible.netcommon.network_cli
    ansible_become: yes
    ansible_become_method: enable

  children:
    spines:
      hosts:
        spine-1:
          ansible_host: 172.20.20.101
          rid: 10.255.0.1
          asn: 65000
        spine-2:
          ansible_host: 172.20.20.102
          rid: 10.255.0.2
          asn: 65000

    leaves:
      hosts:
        leaf-1:
          ansible_host: 172.20.20.111
          rid: 10.255.1.1
          asn: 65000
          vtep_ip: 10.255.1.1
        leaf-2:
          ansible_host: 172.20.20.112
          rid: 10.255.1.2
          asn: 65000
          vtep_ip: 10.255.1.2
        leaf-3:
          ansible_host: 172.20.20.113
          rid: 10.255.1.3
          asn: 65000
          vtep_ip: 10.255.1.3

    border_gws:
      hosts:
        border-a:
          ansible_host: 172.20.20.120
          rid: 10.255.1.10
          asn: 65001
          vtep_ip: 10.255.1.10
        border-b:
          ansible_host: 172.20.20.170
          rid: 10.255.2.10
          asn: 65002
          vtep_ip: 10.255.2.10

    fabric:
      children:
        spines:
        leaves:

    all_network:
      children:
        fabric:
        border_gws:
